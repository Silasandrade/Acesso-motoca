<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Restrito</title>
</head>

<body style="
    margin:0;
    font-family: Arial;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url(https://i.postimg.cc/V6DMxVC9/file-0000000053dc720eb0399b78d498ae71.png);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
">

<div style="
    background:#000;
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:#ffff00;
    width:90%;
    max-width:350px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
">

<h2>🔒 Acesso Restrito</h2>

<input type="password" id="senha" placeholder="Digite a senha" style="
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    margin-top:15px;
">

<br><br>

<button onclick="verificar()" style="
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#ffff00;
    color:#000;
    font-weight:bold;
">
Entrar
</button>

</div>

<script>
function verificar() {
    var senha = document.getElementById("senha").value;
    if(senha === "@Motoca26") {
        window.location.href = "https://tagmotocaprivado.carrd.co";
    } else {
        alert("Senha incorreta");
    }
}
</script>

</body>
</html>
